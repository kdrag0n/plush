name: prerelease

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: prerelease-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            artifact: linux-x86_64-musl
            use_cross: true
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-musl
            artifact: linux-aarch64-musl
            use_cross: true
          - os: macos-15
            target: aarch64-apple-darwin
            artifact: macos-aarch64
            use_cross: false
          - os: macos-15
            target: x86_64-apple-darwin
            artifact: macos-x86_64
            use_cross: false

    steps:
      - name: Check out sources
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust target
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build
        run: |
          set -euo pipefail
          if [[ "${{ matrix.use_cross }}" == "true" ]]; then
            cross build --release --locked --target "${{ matrix.target }}" --bin plush
          else
            cargo build --release --locked --target "${{ matrix.target }}" --bin plush
          fi

      - name: Package
        run: |
          set -euo pipefail
          artifact="${{ matrix.artifact }}"
          target="${{ matrix.target }}"
          mkdir -p dist

          cp "target/${target}/release/plush" "dist/plush-${artifact}"

          if [[ "${target}" == *-musl ]]; then
            file "dist/plush-${artifact}"
            if file "dist/plush-${artifact}" | grep -q "dynamically linked"; then
              echo "musl release binary must be static" >&2
              exit 1
            fi
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/plush-${{ matrix.artifact }}
          if-no-files-found: error

  publish:
    name: publish prerelease
    if: github.ref == 'refs/heads/main' && ((github.event_name == 'push' && github.event.pusher.name == 'kdrag0n') || (github.event_name == 'workflow_dispatch' && github.actor == 'kdrag0n'))
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: write
    steps:
      - name: Check out sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          safe_ref="$(printf '%s' "${REF_NAME}" | tr -c 'A-Za-z0-9._-' '-')"
          tag="prerelease-${safe_ref}"
          short_sha="${SHA:0:12}"
          run_url="${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${tag}" "${SHA}"
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}.git" "refs/tags/${tag}"

          notes="$(mktemp)"
          {
            printf 'Automatic plush prerelease for `%s` at `%s`.\n\n' "${REF_NAME}" "${short_sha}"
            printf 'Built by %s.\n\n' "${run_url}"
            printf 'Assets are uncompressed binaries:\n\n'
            printf -- '- `plush-linux-x86_64-musl`\n'
            printf -- '- `plush-linux-aarch64-musl`\n'
            printf -- '- `plush-macos-aarch64`\n'
            printf -- '- `plush-macos-x86_64`\n'
          } > "${notes}"

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release edit "${tag}" \
              --title "plush prerelease ${REF_NAME} (${short_sha})" \
              --notes-file "${notes}" \
              --prerelease
          else
            gh release create "${tag}" \
              --title "plush prerelease ${REF_NAME} (${short_sha})" \
              --notes-file "${notes}" \
              --prerelease
          fi

          gh release upload "${tag}" dist/* --clobber

      - name: Dispatch Homebrew tap update
        env:
          DISPATCH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          SERVER_URL: ${{ github.server_url }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ -z "${DISPATCH_TOKEN}" ]]; then
            echo "HOMEBREW_TAP_TOKEN is not set; skipping tap dispatch." >&2
            exit 0
          fi

          safe_ref="$(printf '%s' "${REF_NAME}" | tr -c 'A-Za-z0-9._-' '-')"
          tag="prerelease-${safe_ref}"
          run_url="${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}"

          curl --fail-with-body -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/kdrag0n/homebrew-tap/dispatches" \
            -d @- <<EOF
          {
            "event_type": "plush-prerelease",
            "client_payload": {
              "repository": "${REPOSITORY}",
              "release_tag": "${tag}",
              "version": "0.1.0",
              "revision": ${RUN_NUMBER},
              "sha": "${SHA}",
              "run_url": "${run_url}"
            }
          }
          EOF
